function buildGrid(){var g=document.getElementById('grid');g.innerHTML='';sections.forEach(function(k,i){var c=document.createElement('div');c.className='card';c.style.animation='fu 0.4s '+i*0.05+'s both';c.setAttribute('draggable','true');c.dataset.idx=i;c.innerHTML=getHTML(k);g.appendChild(c)});wireAll();wireDragDrop()}
function getHTML(k){
if(k==='weather')return'<div class="ch"><div class="sl">WEATHER</div>'+si.weather+'</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><span style="font-size:40px">☀️</span><div><div style="font-size:38px;font-weight:300;letter-spacing:-2px">19°</div><div style="font-size:11px;color:#888">Clear sky · Feels 19° · 💧68% · 💨6km/h</div></div></div><div style="display:flex;justify-content:space-between">'+[['Sun','☀️',29,16],['Mon','🌤️',30,15],['Tue','🌙',31,18],['Wed','❄️',23,16],['Thu','☁️',17,14]].map(function(f){return'<div style="text-align:center"><div style="font-size:10px;font-weight:600;color:#555">'+f[0]+'</div><div style="font-size:18px;margin:4px 0">'+f[1]+'</div><div style="font-size:12px;font-weight:600">'+f[2]+'°</div><div style="font-size:10px;color:#555">'+f[3]+'°</div></div>'}).join('')+'</div>';

if(k==='climate')return'<div class="ch"><div class="sl">CLIMATE</div><div class="mt '+(heatMode?'h':'c')+'" id="modeBtn">'+(heatMode?'🔥 HEAT':'❄️ COOL')+'</div></div><div class="thermo-wrap"><div class="tg"><canvas id="tc" width="440" height="440"></canvas><div class="thermo-center"><div class="thv" id="tv">'+target.toFixed(1)+'°</div><div class="ths" id="tst" style="color:'+(heatMode?'#FF6B35':'#48CAE4')+'">'+(heatMode?'HEATING':'COOLING')+'</div><div class="thcur">Currently 19°</div></div></div><div class="tbtns"><div class="btn3d" id="tdn">−</div><div class="pwr3d '+(heatOn?'on':'')+'" id="pbtn"><div class="pwr-icon"></div></div><div class="btn3d" id="tup">+</div></div></div>';
if(k==='status')return'<div class="sg">'+[['SECURITY',si.security,'Disarmed','1 open · 10 zones','#4ADE80'],['LIGHTS',si.lights,'0/4','0 rooms active','#eee'],['EV',si.ev,'Disconnected','No EV plugged in','#eee'],['BLINDS',si.blinds,'All Closed','3 blinds','#eee']].map(function(s){return'<div class="sc2"><div class="ch" style="margin-bottom:4px"><div class="sl">'+s[0]+'</div>'+s[1]+'</div><div class="sv" style="color:'+s[4]+'">'+s[2]+'</div><div style="display:flex;justify-content:space-between;align-items:center"><div class="ss">'+s[3]+'</div><span class="arrow">→</span></div></div>'}).join('')+'</div>';
if(k==='energy')return'<div class="ch"><div class="sl">ENERGY</div>'+si.energy+'</div><div class="eg">'+[['Solar',0,5000,'#FFB300'],['Battery',0,100,'#4ADE80'],['Home',0,5000,'#48CAE4'],['EV',0,7000,'#FFB300']].map(function(g){return'<div class="gw"><div class="gc"><canvas class="ecv" data-v="'+g[1]+'" data-m="'+g[2]+'" data-c="'+g[3]+'" width="200" height="200"></canvas><div class="gv" style="color:'+g[3]+'">'+g[1]+'</div></div><div class="gl">'+g[0]+'</div></div>'}).join('')+'</div>';
if(k==='rooms'){var h='<div class="ch"><div class="sl">ROOMS</div>'+si.rooms+'</div>';for(var key in rooms){var r=rooms[key],on=r.level>0;h+='<div class="rr" data-room="'+key+'"><span style="font-size:20px">'+r.emoji+'</span><span class="rn">'+r.name+'</span><span class="rc">0/'+r.total+'</span><span class="rt '+(on?'on':'off')+'" data-toggle="'+key+'">'+(on?'ON':'OFF')+'</span></div>'}return h}
if(k==='irrigation')return'<div class="ch"><div class="sl">IRRIGATION</div>'+si.irrigation+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:14px;font-weight:600">Schedule</div><div style="font-size:9px;font-weight:700;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.04);color:#555;cursor:pointer">RUN ALL</div></div>'+[['Front Lawn','15 min'],['Garden Beds','20 min'],['Rear Lawn','15 min'],['Veggie Patch','10 min']].map(function(z){return'<div class="zone-row"><span style="font-size:14px">🌱</span><span class="zone-name">'+z[0]+'</span><span class="zone-dur">'+z[1]+'</span><span class="zone-status idle">IDLE</span></div>'}).join('');
if(k==='activity')return'<div class="ch"><div class="sl">ACTIVITY</div>'+si.activity+'</div>'+[['💡','Entrance 2 → off','11:28'],['💡','Alfresco → off','11:19'],['💡','Entrance 2 → off','11:16'],['💡','Entrance 1 → off','11:16'],['💡','Alfresco → off','11:14']].map(function(e){return'<div class="evr"><div class="evd"></div><span style="font-size:15px">'+e[0]+'</span><span class="evdesc">'+e[1]+'</span><span class="evt">'+e[2]+'</span></div>'}).join('');return''}
function drawThermo(){var c=document.getElementById('tc');if(!c)return;var ctx=c.getContext('2d'),W=220,dpr=2;c.width=W*dpr;c.height=W*dpr;ctx.scale(dpr,dpr);var CX=W/2,CY=W/2,R=90,SA=135*Math.PI/180,TS=270*Math.PI/180;var on=heatOn;ctx.clearRect(0,0,W,W);var fc=ctx.createRadialGradient(CX-10,CY-15,5,CX,CY,R-6);fc.addColorStop(0,on?'#1a1a1a':'#111');fc.addColorStop(1,on?'#0c0c0c':'#080808');ctx.beginPath();ctx.arc(CX,CY,R-6,0,Math.PI*2);ctx.fillStyle=fc;ctx.fill();ctx.beginPath();ctx.arc(CX,CY,R-16,SA,SA+TS);ctx.strokeStyle=on?'rgba(255,255,255,0.035)':'rgba(255,255,255,0.015)';ctx.lineWidth=7;ctx.lineCap='round';ctx.stroke();var frac=Math.max(0,(target-12)/18),ta=SA+frac*TS;if(frac>0&&on){for(var i=0;i<60;i++){var f=i/60,a0=SA+f*(ta-SA),a1=SA+(f+1/60)*(ta-SA);var rr=Math.round(72+(255-72)*Math.min(f*2,1));var gg=Math.round(202+(140-202)*Math.min(f*2,1));var bb=Math.round(228-228*Math.min(f*1.5,1));ctx.beginPath();ctx.arc(CX,CY,R-16,a0,a1+0.02);ctx.strokeStyle='rgb('+rr+','+gg+','+bb+')';ctx.lineWidth=7;ctx.lineCap='round';ctx.stroke()}ctx.beginPath();ctx.arc(CX,CY,R-16,SA,ta);ctx.strokeStyle=frac<0.5?'rgba(72,202,228,0.05)':'rgba(255,179,0,0.05)';ctx.lineWidth=20;ctx.lineCap='round';ctx.stroke();var tx=CX+(R-16)*Math.cos(ta),ty=CY+(R-16)*Math.sin(ta);ctx.save();ctx.filter='blur(4px)';ctx.beginPath();ctx.arc(tx,ty,10,0,Math.PI*2);ctx.fillStyle=frac<0.4?'rgba(72,202,228,0.3)':frac<0.7?'rgba(255,179,0,0.3)':'rgba(255,87,34,0.3)';ctx.fill();ctx.restore();ctx.beginPath();ctx.arc(tx,ty,8,0,Math.PI*2);ctx.fillStyle=frac<0.4?'#48CAE4':frac<0.7?'#FFB300':'#FF5722';ctx.fill();ctx.beginPath();ctx.arc(tx,ty,3.5,0,Math.PI*2);ctx.fillStyle='#f0f0f0';ctx.fill()}for(var j=0;j<=18;j++){var a=SA+(j/18)*TS,maj=j%3===0;ctx.beginPath();ctx.moveTo(CX+(R-(maj?2:4))*Math.cos(a),CY+(R-(maj?2:4))*Math.sin(a));ctx.lineTo(CX+(R+(maj?5:2))*Math.cos(a),CY+(R+(maj?5:2))*Math.sin(a));ctx.strokeStyle=maj?(on?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.03)'):(on?'rgba(255,255,255,0.025)':'rgba(255,255,255,0.01)');ctx.lineWidth=maj?1:0.5;ctx.stroke()}}
function updateThermo(){var tv=document.getElementById('tv');if(tv){tv.textContent=target.toFixed(1)+'°';tv.style.color=heatOn?'#f0f0f0':'#444'}var ts=document.getElementById('tst');if(ts)ts.style.opacity=heatOn?'1':'0.3';var tc=document.querySelector('.thcur');if(tc)tc.style.opacity=heatOn?'1':'0.3';drawThermo()}
function wireAll(){var cv=document.getElementById('tc');if(cv){var drag=false;cv.addEventListener('pointerdown',function(e){var rect=cv.getBoundingClientRect();var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;var dx=e.clientX-cx,dy=e.clientY-cy;var dist=Math.sqrt(dx*dx+dy*dy),r=rect.width/2;if(dist>r*0.5&&dist<r*1.2){cv.setPointerCapture(e.pointerId);drag=true;thermoP(e);e.preventDefault()}});cv.addEventListener('pointermove',function(e){if(drag){thermoP(e);e.preventDefault()}});cv.addEventListener('pointerup',function(){drag=false});cv.addEventListener('pointercancel',function(){drag=false});function thermoP(e){var rect=cv.getBoundingClientRect();var W=220;var mx=(e.clientX-rect.left)/rect.width*W;var my=(e.clientY-rect.top)/rect.height*W;var deg=Math.atan2(my-W/2,mx-W/2)*180/Math.PI;if(deg<0)deg+=360;var arc=deg-135;if(arc<0)arc+=360;if(arc>270){arc=arc>315?0:270}target=Math.round((12+arc/270*18)*2)/2;target=Math.max(12,Math.min(30,target));updateThermo()}drawThermo()}var tdn=document.getElementById('tdn'),tup=document.getElementById('tup');if(tdn)tdn.onclick=function(){target=Math.max(12,target-0.5);updateThermo()};if(tup)tup.onclick=function(){target=Math.min(30,target+0.5);updateThermo()};var pb=document.getElementById('pbtn');if(pb)pb.onclick=function(){heatOn=!heatOn;pb.className='pwr3d '+(heatOn?'on':'');updateThermo()};var mb=document.getElementById('modeBtn');if(mb)mb.onclick=function(){heatMode=!heatMode;mb.className='mt '+(heatMode?'h':'c');mb.innerHTML=heatMode?'🔥 HEAT':'❄️ COOL';var st=document.getElementById('tst');if(st){st.textContent=heatMode?'HEATING':'COOLING';st.style.color=heatMode?'#FF6B35':'#48CAE4'}};document.querySelectorAll('.sc[data-scene]').forEach(function(el){el.onclick=function(){activeScene=+el.dataset.scene;document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('a');s.querySelector('.n').style.color='#777'});el.classList.add('a');el.querySelector('.n').style.color='#FFB300'}});document.querySelectorAll('.rr[data-room]').forEach(function(el){el.onclick=function(e){if(e.target.closest('[data-toggle]'))return;openDimmer(el.dataset.room)}});document.querySelectorAll('[data-toggle]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var key=el.dataset.toggle;rooms[key].level=rooms[key].level>0?0:0.75;updateRoom(key)}});document.querySelectorAll('.ecv').forEach(function(c){var ctx=c.getContext('2d'),v=+c.dataset.v,m=+c.dataset.m,col=c.dataset.c,dpr=2,W=100;c.width=W*dpr;c.height=W*dpr;ctx.scale(dpr,dpr);var cx=W/2,cy=W/2,r=40,sa=135*Math.PI/180,ts=270*Math.PI/180;ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+ts);ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();if(v>0){ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+(v/m)*ts);ctx.strokeStyle=col;ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke()}})}
function updateRoom(key){var r=rooms[key],on=r.level>0;var tog=document.querySelector('[data-toggle="'+key+'"]');if(tog){tog.className='rt '+(on?'on':'off');tog.textContent=on?'ON':'OFF'}}
function openDimmer(key){var r=rooms[key],lv=r.level,on=lv>0,pct=Math.round(lv*100);var a1=(0.15+lv*0.15).toFixed(2),a2=(0.3+lv*0.55).toFixed(2);document.getElementById('dimBox').innerHTML='<div class="modal-hdr"><span style="font-size:24px">'+r.emoji+'</span><span class="rn">'+r.name+'</span><span class="rt '+(on?'on':'off')+'" id="mrt">'+(on?'ON':'OFF')+'</span><span class="close-x" id="mcx">✕</span></div><div class="modal-body"><div class="vslider" id="mvs"><div class="vtrack"></div><div class="vfill" id="mfill" style="height:'+pct+'%;background:linear-gradient(to top,rgba(255,179,0,'+a1+'),rgba(255,179,0,'+a2+'))"></div><div class="vthumb" id="mthumb" style="bottom:'+Math.round(lv*178)+'px;background:linear-gradient(to bottom,'+(on?'#4A3800':'#3A3A3A')+','+(on?'#332600':'#222')+')">'+'<div class="vthumb-grip" style="background:'+(on?'rgba(255,179,0,0.4)':'rgba(255,255,255,0.15)')+'"></div></div></div><div class="slider-info"><div class="slider-pct" id="mpct" style="color:'+(on?'#FFB300':'#555')+'">'+pct+'%</div><div style="font-size:10px;color:#555">Brightness</div><div style="flex:1"></div><div class="presets" id="mpre">'+[25,50,75,100].map(function(p){return'<span data-p="'+p+'" class="'+(pct===p?'act':'')+'">'+p+'%</span>'}).join('')+'</div></div></div>';document.getElementById('dimModal').classList.add('open');document.getElementById('mcx').onclick=closeDimmer;document.getElementById('dimBg').onclick=closeDimmer;document.getElementById('mrt').onclick=function(e){e.stopPropagation();rooms[key].level=rooms[key].level>0?0:0.75;updateModal(key);updateRoom(key)};document.getElementById('mpre').querySelectorAll('span').forEach(function(sp){sp.onclick=function(){rooms[key].level=+sp.dataset.p/100;updateModal(key);updateRoom(key)}});var vs=document.getElementById('mvs'),d2=false;vs.addEventListener('pointerdown',function(e){vs.setPointerCapture(e.pointerId);d2=true;sliderP(e,key);e.preventDefault()});vs.addEventListener('pointermove',function(e){if(d2){sliderP(e,key);e.preventDefault()}});vs.addEventListener('pointerup',function(){d2=false});vs.addEventListener('pointercancel',function(){d2=false})}
function sliderP(e,key){var rect=document.getElementById('mvs').getBoundingClientRect();var frac=1-(e.clientY-rect.top)/rect.height;frac=Math.max(0,Math.min(1,frac));rooms[key].level=Math.round(frac*100)/100;updateModal(key);updateRoom(key)}
function updateModal(key){var r=rooms[key],lv=r.level,on=lv>0,pct=Math.round(lv*100);var f=document.getElementById('mfill'),t=document.getElementById('mthumb'),p=document.getElementById('mpct'),tog=document.getElementById('mrt');if(f){f.style.height=pct+'%';f.style.background='linear-gradient(to top,rgba(255,179,0,'+(0.15+lv*0.15).toFixed(2)+'),rgba(255,179,0,'+(0.3+lv*0.55).toFixed(2)+'))'}if(t){t.style.bottom=Math.round(lv*178)+'px';t.style.background='linear-gradient(to bottom,'+(on?'#4A3800':'#3A3A3A')+','+(on?'#332600':'#222')+')';var grip=t.querySelector('.vthumb-grip');if(grip)grip.style.background=on?'rgba(255,179,0,0.4)':'rgba(255,255,255,0.15)'}if(p){p.textContent=pct+'%';p.style.color=on?'#FFB300':'#555'}if(tog){tog.className='rt '+(on?'on':'off');tog.textContent=on?'ON':'OFF'}var pre=document.getElementById('mpre');if(pre)pre.querySelectorAll('span').forEach(function(sp){sp.className=+sp.dataset.p===pct?'act':''})}
function closeDimmer(){document.getElementById('dimModal').classList.remove('open')}
function wireDragDrop(){var cards=document.querySelectorAll('.card');var dragIdx=null;cards.forEach(function(card,i){card.addEventListener('dragstart',function(e){dragIdx=i;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',i)});card.addEventListener('dragend',function(){card.classList.remove('dragging');document.querySelectorAll('.card').forEach(function(c){c.classList.remove('drag-over')})});card.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';if(+card.dataset.idx!==dragIdx)card.classList.add('drag-over')});card.addEventListener('dragleave',function(){card.classList.remove('drag-over')});card.addEventListener('drop',function(e){e.preventDefault();card.classList.remove('drag-over');var from=dragIdx;var to=+card.dataset.idx;if(from!==null&&from!==to){var item=sections.splice(from,1)[0];sections.splice(to,0,item);buildGrid()}})})}
buildGrid();
