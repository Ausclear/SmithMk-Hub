name: smithmk_hub
description: SmithMk Smart Home Hub — Premium home automation dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  animated_emoji: ^3.1.0
  flutter_dynamic_icon: ^2.1.0
  syncfusion_flutter_gauges: ^28.1.33

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

  fonts:
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf
